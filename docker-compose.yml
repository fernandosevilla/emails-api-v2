services:
  postgres:
    image: postgres:17-alpine
    container_name: emails-api-v2-postgres
    environment:
      POSTGRES_DB: emails_api_v2
      POSTGRES_USER: emails_api_v2
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - emails-api-v2-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U emails_api_v2 -d emails_api_v2"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: emails-api-v2
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/emails_api_v2
      SPRING_DATASOURCE_USERNAME: emails_api_v2
      SPRING_DATASOURCE_PASSWORD: secret
      SERVER_PORT: 8080
    ports:
      - "8080:8080"

volumes:
  emails-api-v2-postgres-data: